# Default server definition
server {
    listen [::]:8080 default_server;
    listen 8080 default_server;
    client_max_body_size 10M;
    # Timeout settings for large uploads
    client_body_timeout 1600s;
    client_header_timeout 1600s;
    send_timeout 1600s;
    # Character Sharing Pretty URLs
    location ~ ^/([a-z0-9\-]+)/([a-z0-9\-]+)$ {
        try_files $uri $uri/ /public_character.php?realm=$1&name=$2;
    # Block access to db.php - contains MySQL credentials!
    location ~ ^/(db\.php|sql_setup\.php|add_sharing_columns\.php)$ {
    deny all;
    return 404;
    }}
    # Block access to backup files
    location ~ \.(bak|backup|old|orig|save|swp|~)$ {
    deny all;
    return 404;
    }
    # Disable directory listing
    autoindex off;
    # Block access to SQL dumps and database files
    location ~ \.(sql|sqlite|db)$ {
    deny all;
    return 404;
    }
    # Prevent execution of scripts in upload directories
    location ~* ^/uploads/.*\.(php|php3|php4|php5|phtml|pl|py|jsp|asp|sh|cgi)$ {
    deny all;
    return 404;
    }
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    server_name _;
    
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    sendfile off;

    tcp_nodelay on;
    absolute_redirect off;

    root /var/www/html;
    index index.php index.html;

    location / {
        # First attempt to serve request as file, then
        # as directory, then fall back to index.php
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Redirect server error pages to the static page /50x.html
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/lib/nginx/html;
    }

    # Pass the PHP scripts to PHP-FPM listening on php-fpm.sock
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
        include fastcgi_params;
        # CRITICAL TIMEOUT SETTINGS FOR LARGE UPLOADS
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_connect_timeout 600s;
        
        # Buffer settings for large responses
        fastcgi_buffering on;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
    }

    # Set the cache-control headers on assets to cache for 5 days
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml)$ {
        expires 5d;
    }

    # Deny access to . files, for security
    location ~ /\. {
        log_not_found off;
        deny all;
    }

    # Allow fpm ping and status from localhost
    location ~ ^/(fpm-status|fpm-ping)$ {
        access_log off;
        allow 127.0.0.1;
        deny all;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm.sock;
    }
}
