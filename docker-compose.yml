services:
  backend:
    image: belmontlabs/whodash-db:latest
    container_name: whodash_backend
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: whodat
      MYSQL_USER: whodatuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/mysql

  frontend:
    image: belmontlabs/whodash:latest
    container_name: whodash_frontend
    ports:
      - "8090:8080"
    environment:
      DB_HOST: backend
      DB_USER: whodatuser
      DB_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      DB_NAME: whodat
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  db_data: